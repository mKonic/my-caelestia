name: Build packages

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write   # required for the release step on tag pushes

env:
  # Keep makepkg's src/ and pkg/ working dirs out of the repo tree.
  # Default makepkg places src/ next to PKGBUILD, which collides with
  # cli/src/ (the actual Python source). These vars redirect to a single
  # .makepkg/ dir at repo root, separate per package.
  MAKEPKG_PKGDEST: ${{ github.workspace }}/.makepkg/dist

jobs:
  build:
    name: Build .pkg.tar.zst
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --user root

    steps:
      - name: Refresh pacman DB and install build deps (official repos)
        run: |
          pacman -Syu --noconfirm --needed \
            git sudo \
            cmake ninja meson \
            qt6-base qt6-declarative qt6-shadertools \
            libqalculate aubio libpipewire \
            fftw ncurses alsa-lib iniparser libglvnd sdl2 portaudio sndio libpulse \
            python python-build python-installer python-hatch

      - name: Build and install libcava from upstream
        run: |
          # libcava is not in the official Arch repos and the AUR's paru-bin
          # is currently stale (linked against libalpm.so.15). Vendor the
          # LukashonakV/cava fork — same source the AUR libcava PKGBUILD uses,
          # which provides /usr/lib/libcava.so + headers + libcava.pc.
          set -e
          cd /tmp
          curl -fsSL -o libcava.tar.gz \
            "https://github.com/LukashonakV/cava/archive/refs/tags/0.10.7.tar.gz"
          tar -xzf libcava.tar.gz
          cd cava-0.10.7
          meson setup -Dcava_font=false --prefix=/usr build
          meson compile -C build
          meson install -C build

      - name: Create non-root build user
        run: |
          # makepkg refuses to run as root.
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fix workspace ownership for builder user
        run: |
          mkdir -p "$MAKEPKG_PKGDEST"
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build caelestia-cli
        working-directory: cli
        run: |
          sudo -u builder \
            BUILDDIR="$GITHUB_WORKSPACE/.makepkg/build-cli" \
            PKGDEST="$MAKEPKG_PKGDEST" \
            makepkg --noconfirm --nodeps

      - name: Build caelestia-shell
        working-directory: shell
        run: |
          sudo -u builder \
            BUILDDIR="$GITHUB_WORKSPACE/.makepkg/build-shell" \
            PKGDEST="$MAKEPKG_PKGDEST" \
            makepkg --noconfirm --nodeps

      - name: List built packages
        run: |
          echo "::group::Built packages"
          ls -lh "$MAKEPKG_PKGDEST"/*.pkg.tar.zst
          echo "::endgroup::"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caelestia-packages
          path: .makepkg/dist/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release (tag pushes only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: .makepkg/dist/*.pkg.tar.zst
